site_name: Inera's FHIR Standards
site_url: https://inera-ab.github.io/Inera-FHIR-landingpage/
site_description: Landing page for Inera's FHIR standards and implementation guides
site_author: Inera AB

repo_name: Inera-AB/Inera-FHIR-landingpage
repo_url: https://github.com/Inera-AB/Inera-FHIR-landingpage

theme:
  name: material
  language: en
  logo: assets/images/inera-logo.svg
  favicon: assets/images/inera-thumbnail.png
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - content.tooltips

plugins:
  - search:
      lang:
        - en
        - sv
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: "🇬🇧 English"
          build: true
        - locale: sv
          name: "🇸🇪 Svenska"
          build: true
          nav_translations:
            Home: Hem
            "New to FHIR?": "Ny på FHIR?"
            FAQ: Vanliga frågor
            Governance: Styrning

extra_css:
  - assets/css/inera.css

nav:
  - Home: index.md
  - New to FHIR?: assets/documents/NewToFHIR.md
  - FAQ: assets/documents/FAQ.md
  - Governance: assets/documents/Governance.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - tables
