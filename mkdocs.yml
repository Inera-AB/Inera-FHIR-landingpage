site_name: Inera's FHIR Standards
site_url: https://fhir.inera.se/
site_description: Landing page for Inera's FHIR standards and implementation guides
site_author: Inera AB

repo_name: Inera-AB/Inera-FHIR-landingpage
repo_url: https://github.com/Inera-AB/Inera-FHIR-landingpage

theme:
  name: material
  language: sv
  logo: assets/images/inera-logo.svg
  favicon: assets/images/inera-thumbnail.png
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - content.tooltips

plugins:
  - search:
      lang:
        - en
        - sv
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: sv
          default: true
          name: "🇸🇪 Svenska"
          build: true
        - locale: en
          name: "🇬🇧 English"
          build: true
          nav_translations:
            Hem: Home
            "Ny på FHIR?": "New to FHIR?"
            "Vanliga frågor": FAQ
            Styrning: Governance

extra_css:
  - assets/css/inera.css

nav:
  - Hem: index.md
  - Ny på FHIR?: assets/documents/NewToFHIR.md
  - Vanliga frågor: assets/documents/FAQ.md
  - Styrning: assets/documents/Governance.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - tables
