name: Deploy MkDocs to fhir-portal

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Deploy to fhir-portal
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          cd site
          git init
          git add .
          git commit -m "Deploy from inera-fhir-landingpage@${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.FHIR_PORTAL_TOKEN }}@github.com/inera-ab/fhir-portal.git" \
            HEAD:gh-pages
